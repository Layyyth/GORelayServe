version: '3.8'

services:
  # The Redis Cache Layer
  redis:
    image: redis:7-alpine
    container_name: relay_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Go Relay App
  relay:
    build: .
    container_name: go_relay
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis

volumes:
  redis_data:
