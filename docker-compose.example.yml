version: '3.8'

services:
  # Go Relay App (pre-built image)
  relay:
    image: laithaj/gorelayserve:latest
    container_name: go_relay
    restart: always
    ports:
      - "8080:8080"
    environment:
      - LLM_PROVIDER_URL=${LLM_PROVIDER_URL}
      - LLM_PROVIDER_KEY=${LLM_PROVIDER_KEY}
      - REDIS_ADDR=${REDIS_ADDR:-localhost:6379}
      - RELAY_PORT=8080
