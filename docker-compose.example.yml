version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: relay_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  relay:
    image: gorelayserve-relay:latest
    container_name: go_relay
    restart: always
    ports:
      - "8080:8080"
    environment:
      - LLM_PROVIDER_URL=${LLM_PROVIDER_URL}
      - LLM_PROVIDER_KEY=${LLM_PROVIDER_KEY}
      - REDIS_ADDR=redis:6379
      - RELAY_PORT=8080
    depends_on:
      - redis
    volumes:
      - ./coding_rules:/app/coding_rules

volumes:
  redis_data:
